<!DOCTYPE html>
<html>
<head>
    <title>AFM Tow Boogie Visualizer - Ultra-Scale</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f8fafc; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .wrapper { display: flex; gap: 20px; background: #1e293b; padding: 20px; border-radius: 14px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); border: 1px solid #334155; }
        .controls { width: 250px; display: flex; flex-direction: column; gap: 15px; }
        .ctrl-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
        input[type=range] { cursor: pointer; accent-color: #38bdf8; }
        select { padding: 8px; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #475569; outline: none; width: 100%; }
        .v { color: #38bdf8; float: right; font-family: 'Courier New', monospace; font-weight: bold; }
        canvas { background: #020617; border-radius: 8px; border: 2px solid #334155; }
        h2 { color: #38bdf8; margin-bottom: 10px; font-weight: 800; }
        .legend { margin-top: 10px; font-size: 11px; color: #64748b; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .lg-i { display: flex; align-items: center; gap: 6px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>
    <h2>AFM TOW BOOGIE VISUALIZER</h2>
    <div class="wrapper">
        <div class="controls">
            <div class="control-group">
                <label>Tracking Mode</label>
                <select id="mode">
                    <option value="Behind">Directly Behind</option>
                    <option value="Near Right">Near Right</option>
                    <option value="Near Left">Near Left</option>
                </select>
            </div>
            <div class="ctrl-group">
                <label>Min Distance <span class="v" id="v_min">10m</span></label>
                <input type="range" id="min_dist" min="5" max="50" value="10">
            </div>
            <div class="ctrl-group">
                <label>Smoothing Band <span class="v" id="v_smooth">10m</span></label>
                <input type="range" id="smooth" min="2" max="30" value="10">
            </div>
            <div class="ctrl-group">
                <label>Enter Angle <span class="v" id="v_enter">35°</span></label>
                <input type="range" id="enter" min="5" max="90" value="35">
            </div>
            <div class="ctrl-group">
                <label>Exit Angle <span class="v" id="v_exit">45°</span></label>
                <input type="range" id="exit" min="5" max="90" value="45">
            </div>
            <div class="ctrl-group">
                <label>Offset Angle <span class="v" id="v_offset">45°</span></label>
                <input type="range" id="offset" min="0" max="90" value="45">
            </div>
            <div class="legend">
                <div class="lg-i"><div class="dot" style="background: lime;"></div> Active Zone</div>
                <div class="lg-i"><div class="dot" style="background: red;"></div> Safety Exit</div>
                <div class="lg-i"><div class="dot" style="background: #f87171;"></div> Dead Zone</div>
                <div class="lg-i"><div class="dot" style="background: #fbbf24;"></div> Ramp Zone</div>
            </div>
        </div>
        <canvas id="viz" width="500" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');
        const inputs = ['min_dist', 'smooth', 'enter', 'exit', 'offset', 'mode'];

        function draw() {
            const min_dist = parseInt(document.getElementById('min_dist').value);
            const smooth = parseInt(document.getElementById('smooth').value);
            const enter = parseInt(document.getElementById('enter').value);
            const exit = parseInt(document.getElementById('exit').value);
            const offset = parseInt(document.getElementById('offset').value);
            const mode = document.getElementById('mode').value;

            document.getElementById('v_min').innerText = min_dist + "m";
            document.getElementById('v_smooth').innerText = smooth + "m";
            document.getElementById('v_enter').innerText = enter + "°";
            document.getElementById('v_exit').innerText = exit + "°";
            document.getElementById('v_offset').innerText = offset + "°";

            const cx = canvas.width / 2;
            const cy = 100; 

            // ---> UPDATED SCALE MATH <---
            // We find the "total reach" and fit it into the height of the canvas
            const totalMetersVisible = min_dist + smooth + 10; 
            const scale = (canvas.height - cy - 50) / totalMetersVisible;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. Draw Tracking Cones with dynamic radius
            const coneRadius = (min_dist + smooth + 5) * scale;
            
            ctx.globalAlpha = 0.08;
            ctx.fillStyle = 'red';
            drawSector(cx, cy, coneRadius + (20 * scale), 90 - exit, 90 + exit);
            
            ctx.globalAlpha = 0.15;
            ctx.fillStyle = 'lime';
            drawSector(cx, cy, coneRadius, 90 - enter, 90 + enter);

            // 2. Position Logic
            let angle = 90;
            if (mode === 'Near Right') angle -= offset;
            if (mode === 'Near Left') angle += offset;

            const targetDist = (min_dist + (smooth / 2)) * scale;
            const bx = cx + Math.cos(angle * Math.PI / 180) * targetDist;
            const by = cy + Math.sin(angle * Math.PI / 180) * targetDist;

            // 3. Draw Buggy Zones
            ctx.globalAlpha = 0.25;
            ctx.fillStyle = '#f87171';
            ctx.beginPath(); ctx.arc(bx, by, min_dist * scale, 0, Math.PI * 2); ctx.fill();

            ctx.strokeStyle = '#fbbf24';
            ctx.lineWidth = smooth * scale;
            ctx.globalAlpha = 0.15;
            ctx.beginPath(); ctx.arc(bx, by, (min_dist + (smooth / 2)) * scale, 0, Math.PI * 2); ctx.stroke();

            // 4. Icons
            ctx.globalAlpha = 1.0;
            ctx.textAlign = "center";
            
            // Foiler
            ctx.font = (20 * (scale/10) + 10) + 'px Arial'; 
            ctx.fillText("🏄", cx, cy + 10);
            ctx.font = 'bold 11px Arial';
            ctx.fillStyle = "white";
            ctx.fillText("FOILER", cx, cy - 35);

            // Buggy
            ctx.save();
            ctx.translate(bx, by);
            ctx.rotate((angle - 90) * Math.PI / 180);
            ctx.font = (15 * (scale/10) + 10) + 'px Arial';
            ctx.fillText("🚢", 0, 10);
            ctx.restore();
            
            ctx.font = 'bold 11px Arial';
            ctx.fillStyle = "white";
            ctx.fillText("BUGGY", bx, by - (min_dist * scale) - 10);
        }

        function drawSector(x, y, radius, start, end) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.arc(x, y, radius, start * Math.PI / 180, end * Math.PI / 180);
            ctx.closePath();
            ctx.fill();
        }

        inputs.forEach(id => document.getElementById(id).addEventListener('input', draw));
        draw();
    </script>
</body>
</html>
